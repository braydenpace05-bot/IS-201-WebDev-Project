        <!-- Dinosaur Game Code -->
           <script>
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');

            let dino = { x: 50, y: 150, w: 40, h: 40, vy: 0, jumping: false };
            let gravity = 0.6;
            let obstacles = [];
            let speed = 6;
            let frame = 0;
            let score = 0;
            let gameOver = false;
            let gameStarted = false;
            let nextObstacleFrame = 90;
            let minSpawnGap = 60;
            let maxSpawnGap = 120;

            function drawDino() {
                ctx.fillStyle = 'black';
                ctx.fillRect(dino.x, dino.y, dino.w, dino.h);
            }

            function drawObstacles() {
                ctx.fillStyle = 'green';
                obstacles.forEach(o => {
                    ctx.fillRect(o.x, o.y, o.w, o.h);
                });
            }

            function drawGround() {
                ctx.strokeStyle = '#8a8a8a';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, 190);
                ctx.lineTo(canvas.width, 190);
                ctx.stroke();
            }

            function drawScore() {
                ctx.fillStyle = '#333';
                ctx.font = '16px sans-serif';
                ctx.fillText('Score: ' + score, 10, 24);
                if (gameOver) {
                    ctx.fillStyle = '#d00';
                    ctx.font = '20px sans-serif';
                    ctx.fillText('Game Over - Press Space to restart', 160, 110);
                }
            }

            function jump() {
                if (gameOver) return;
                if (!dino.jumping) {
                    dino.vy = -12;
                    dino.jumping = true;
                    gameStarted = true;
                }
            }

            function resetGame() {
                obstacles = [];
                speed = 6;
                frame = 0;
                score = 0;
                nextObstacleFrame = 90;
                dino.y = 150;
                dino.vy = 0;
                dino.jumping = false;
                gameOver = false;
                gameStarted = true;
            }

            function update() {
                frame++;
                dino.y += dino.vy;
                dino.vy += gravity;

                if (dino.y >= 150) {
                    dino.y = 150;
                    dino.vy = 0;
                    dino.jumping = false;
                }

                if (frame >= nextObstacleFrame) {
                    obstacles.push({ x: canvas.width, y: 150, w: 20, h: 40 });
                    nextObstacleFrame = frame + minSpawnGap + Math.floor(Math.random() * (maxSpawnGap - minSpawnGap));
                }

                speed = 6 + score * 0.03;

                obstacles.forEach(o => o.x -= speed);

                obstacles = obstacles.filter(o => o.x > -o.w);

                score = Math.floor(frame / 10);

                obstacles.forEach(o => {
                    if (
                        dino.x < o.x + o.w &&
                        dino.x + dino.w > o.x &&
                        dino.y < o.y + o.h &&
                        dino.y + dino.h > o.y
                    ) {
                        gameOver = true;
                    }
                });

                if (gameOver) {
                    gameStarted = false;
                }
            }

            function render() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawGround();
                drawDino();
                drawObstacles();
                drawScore();
            }

            function loop() {
                if (gameStarted && !gameOver) {
                    update();
                }
                render();
                requestAnimationFrame(loop);
            }

            window.addEventListener('keydown', (event) => {
                if (event.code === 'Space' || event.code === 'ArrowUp') {
                    event.preventDefault();
                    if (gameOver) {
                        resetGame();
                    } else {
                        jump();
                    }
                }
            });

            canvas.addEventListener('click', () => {
                if (gameOver) {
                    resetGame();
                } else {
                    jump();
                }
            });

            resetGame();
            loop();
        </script>
